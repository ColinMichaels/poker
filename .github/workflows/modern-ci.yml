name: Modern CI

on:
  pull_request:
    paths:
      - '.github/workflows/modern-ci.yml'
      - 'modern/**'
  push:
    branches:
      - main
      - master
      - feature/**
    paths:
      - '.github/workflows/modern-ci.yml'
      - 'modern/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: modern-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  modern-ci:
    name: Typecheck, Build, Test Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modern

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: modern/.nvmrc
          cache: npm
          cache-dependency-path: modern/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Engine Tests
        run: npm run test:engine
